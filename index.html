        .filename-display { margin-top: 10px; font-size: 14px; color: #60a5fa; font-weight: 600; word-break: break-all; }

        .color-swatch:hover { transform: scale(1.1); }
        .custom-color-input { width: 36px; height: 36px; border: none; border-radius: 50%; cursor: pointer; overflow: hidden; background: none; }

        /* Premium Preset Visual Background Gallery */
        .bg-gallery { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .bg-thumb { width: 100%; aspect-ratio: 16/10; border-radius: 8px; cursor: pointer; object-fit: cover; border: 2px solid transparent; transition: all 0.2s; }
        .bg-thumb:hover { transform: scale(1.05); border-color: var(--primary); }
        
        .custom-bg-btn { background: #334155; border: 1px dashed #64748b; color: white; border-radius: 8px; font-size: 12px; font-weight: 600; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; height: 100%; min-height: 48px; }

    </style>
</head>
